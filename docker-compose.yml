services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cba-api-app
    restart: unless-stopped
    network_mode: host
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    env_file:
      - .env
    depends_on:
      - minio

  minio:
    image: minio/minio:latest
    container_name: cba-api-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

volumes:
  minio-data:
